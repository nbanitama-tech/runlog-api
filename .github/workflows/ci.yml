name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Download dependencies
        run: go mod download

      - name: Format check
        run: |
          test -z "$(gofmt -l .)"

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.4

      - name: Test
        run: go test ./...

      - name: Build
        run: go build -o bin/runlog-api ./cmd/api

      - name: Docker build
        run: docker build -t runlog-api .